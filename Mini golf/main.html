<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Mini Golf</title>
	<style>
		html,body { height:100%; margin:0; background:#000; display:flex; align-items:center; justify-content:center; }
		body { overflow:hidden; }
		.app-shell { display:flex; align-items:center; justify-content:center; gap:16px; padding:16px; box-sizing:border-box; }
		.side-panel { display:flex; flex-direction:column; gap:12px; min-width:120px; }
		.side-panel button { width:100%; padding:12px 14px; border:none; border-radius:10px; background:#1f2f62; color:#ffffff; font-weight:700; cursor:pointer; }
		.side-panel button.active { background:#ffde59; color:#102a43; }
		.palette { padding:12px; border-radius:14px; background:#ffffff; box-shadow:0 8px 20px rgba(0,0,0,0.08); }
		.palette > div { display:grid; gap:12px; }
		.tool { width:56px; height:56px; border:2px solid #1f2f62; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; font-weight:700; }
		.tool.selected { background:#1f2f62; color:#ffffff; }
		canvas { width:1000px; height:600px; max-width:100%; max-height:100%; display:block; border-radius:6px; box-shadow:0 6px 18px rgba(0,0,0,0.35); }
	</style>
</head>
<body>
	<div class="app-shell">
		<div class="side-panel" id="leftPanel">
			<button id="playButton" class="active">Play</button>
			<button id="editorButton">Level Editor</button>
		</div>
		<canvas id="game" aria-label="mini golf canvas"></canvas>
		<div class="side-panel" id="rightPanel">
			<div class="palette">
				<div class="tool" id="blockTile" data-tool="box">1x1</div>
				<div class="tool" id="sphereTile" data-tool="sphere">O</div>
				<div class="tool" id="winTile" data-tool="win">WIN</div>
			</div>
		</div>
	</div>
	<script src="main.js"></script>
	<script src="editor.js"></script>
</body>
</html>
